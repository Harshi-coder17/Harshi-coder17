<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="298" rx="12" fill="#0B0B15" stroke="#2A2547" stroke-width="1.4"/>

  <text x="450" y="42" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="18" letter-spacing="4" font-weight="700" fill="#E5E7EB">CYBER OPERATIONS DASHBOARD</text>
  <line x1="40" y1="58" x2="860" y2="58" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="62" x2="860" y2="62" stroke="#22D3EE" stroke-width="0.6" opacity="0.3"/>

  <!-- status column -->
  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="14">
    <text x="52" y="98" fill="#6B7280" letter-spacing="1">STATUS</text>
    <text x="230" y="98" fill="#22D3EE" font-weight="700">● ONLINE</text>

    <text x="52" y="128" fill="#6B7280" letter-spacing="1">DOMAIN</text>
    <text x="230" y="128" fill="#E5E7EB">AI-DRIVEN THREAT DETECTION</text>

    <text x="52" y="158" fill="#6B7280" letter-spacing="1">SPECIALITY</text>
    <text x="230" y="158" fill="#E5E7EB">AI + CYBERSECURITY</text>

    <text x="52" y="188" fill="#6B7280" letter-spacing="1">MODE</text>
    <text x="230" y="188" fill="#E5E7EB">BUILDING</text>

    <text x="52" y="218" fill="#6B7280" letter-spacing="1">CLEARANCE</text>
    <text x="230" y="218" fill="#A78BFA">HACKATHON WINNER-TRACK</text>
  </g>

  <line x1="450" y1="76" x2="450" y2="240" stroke="#221F3B" stroke-width="1"/>

  <!-- systems column -->
  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13">
    <text x="486" y="90" fill="#6B7280" letter-spacing="2">SYSTEMS</text>

    <text x="486" y="116" fill="#E5E7EB">AI / ML</text>
    <rect x="486" y="124" width="360" height="8" rx="4" fill="#161327"/>
    <rect x="486" y="124" width="0" height="8" rx="4" fill="url(#barFill)">
      <animate attributeName="width" values="0;324" dur="1.6s" begin="0.2s" fill="freeze"/>
    </rect>

    <text x="486" y="152" fill="#E5E7EB">SECURE BACKEND</text>
    <rect x="486" y="160" width="360" height="8" rx="4" fill="#161327"/>
    <rect x="486" y="160" width="0" height="8" rx="4" fill="url(#barFill)">
      <animate attributeName="width" values="0;288" dur="1.6s" begin="0.4s" fill="freeze"/>
    </rect>

    <text x="486" y="188" fill="#E5E7EB">DIGITAL FORENSICS</text>
    <rect x="486" y="196" width="360" height="8" rx="4" fill="#161327"/>
    <rect x="486" y="196" width="0" height="8" rx="4" fill="url(#barFill)">
      <animate attributeName="width" values="0;270" dur="1.6s" begin="0.6s" fill="freeze"/>
    </rect>

    <text x="486" y="224" fill="#E5E7EB">OFFENSIVE SECURITY</text>
    <rect x="486" y="232" width="360" height="8" rx="4" fill="#161327"/>
    <rect x="486" y="232" width="0" height="8" rx="4" fill="url(#barFill)">
      <animate attributeName="width" values="0;234" dur="1.6s" begin="0.8s" fill="freeze"/>
    </rect>
  </g>

  <line x1="40" y1="256" x2="860" y2="256" stroke="#221F3B" stroke-width="1"/>
  <text x="450" y="280" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="11" letter-spacing="2" fill="#5EEAD4" opacity="0.8">LAST UPDATED :: ALWAYS LEARNING</text>
</svg>
